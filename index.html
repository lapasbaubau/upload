<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>LAPAS BAUBAU</title>

  <!-- CSS eksternal -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="iframe-container">
    <iframe
      id="uploadFrame"
      src="https://script.google.com/macros/s/AKfycbxuPjNSMSC7b7bMm5-rZ1GR_G1Tp0gNfHKLCBDi7vKPEw36eOB9aXXTGPIiFKEMeWAV/exec"
      scrolling="no"
      allowfullscreen>
    </iframe>
  </div>

  <!-- JS eksternal -->
  <script src="script.js"></script>

  <script>
    // Refresh iframe setiap 2 menit
    setInterval(() => {
      const iframe = document.getElementById('uploadFrame');
      iframe.src = iframe.src;
    }, 120000); // 120000 ms = 2 menit
  </script>

</body>
</html>
